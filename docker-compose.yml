services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_hackiathon
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${MY_SECRET_KEY}
      - N8N_TUNNEL=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./backups:/data_backups

volumes:
  n8n_data:
